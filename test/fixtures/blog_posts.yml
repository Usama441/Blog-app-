draft:
  title: Draft Post
  body: This is a draft post that should not be published.
  published_at: null

published:
  title: Published Post
  body: This is a published post that should be visible.
  published_at: <%= 1.day.ago %>   

scheduled:
  title: Scheduled Post
  body: This is a scheduled post that should be published in the future.
  published_at: <%= 1.day.from_now %>